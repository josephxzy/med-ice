name: Smoke test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-linux:
    name: Rime smoke test
    runs-on: ubuntu-24.04
    if: github.repository == 'josephxzy/med-ice'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install lint dependencies
        run: |
          python3 -m pip install yamllint
          sudo apt install -y luarocks
          sudo luarocks install luacheck

      - name: Run lint
        run: make -C build lint

      # Prepare output directory (so smoke always has files to test)
      - name: Prepare output directory
        run: |
          mkdir -p build/out/{cn_dicts,en_dicts,opencc,lua/cold_word_drop,build}
          cp src/config/default.yaml src/config/squirrel.yaml src/config/weasel.yaml build/out/
          cp src/config/symbols_v.yaml src/config/symbols_caps_v.yaml build/out/
          cp src/config/custom_phrase.txt build/out/
          cp src/schema/*.yaml build/out/
          cp src/dict/*.dict.yaml build/out/
          cp src/dict/cn/*.yaml build/out/cn_dicts/
          cp src/dict/en/en.dict.yaml src/dict/en/en_ext.dict.yaml build/out/en_dicts/
          cp src/dict/en/cn_en*.txt build/out/en_dicts/
          cp -r src/lua/* build/out/lua/
          cp src/opencc/emoji.json src/opencc/emoji.txt src/opencc/others.txt build/out/opencc/
          cp src/recipes/recipe.yaml build/out/
          cp LICENSE build/out/
          touch build/out/build/.gitkeep

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Build
        run: make -C build build

      - name: Cache rime cli bundle
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/rime-cli-cache/rime-cli-linux-1.6.1.zip
          key: rime-cli-linux-1.6.1

      - name: Run smoke test suite
        env:
          RIME_CLI_URL: https://github.com/mirtlecn/public/releases/download/v1.6.1/rime-cli-linux-1.6.1.zip
          RIME_CLI_CACHE_PATH: ${{ runner.temp }}/rime-cli-cache/rime-cli-linux-1.6.1.zip
        run: make -C build smoke
